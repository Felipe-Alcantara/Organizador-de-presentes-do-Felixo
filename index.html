<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Organize, salve e acompanhe suas ideias de presentes — direto no navegador, sem servidor." />
  <meta name="theme-color" content="#09090b" />
  <title>Organizador de Presentes do Felixo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       Felixo System Design — paleta e tokens
       Roxo de marca: #C084FC (estático) / #A855F7 (vibrante, glow)
       Fundo: gradiente black → zinc-950 → black
       Fonte: Space Grotesk
       ============================================================ */
    :root{
      --felixo-purple:#C084FC;
      --felixo-purple-bright:#A855F7;
      --bg-base:#000000;
      --bg-zinc-950:rgb(9,9,11);
      --bg-zinc-900:rgb(24,24,27);
      --bg-zinc-800:rgb(39,39,42);
      --text-50:rgb(250,250,250);
      --text-300:rgb(212,212,216);
      --text-400:rgb(161,161,170);
      --border:rgba(255,255,255,0.10);
      --border-subtle:rgba(255,255,255,0.05);
      --border-hover:rgba(255,255,255,0.20);
      --radius:1rem;        /* rounded-2xl */
      --radius-lg:1.5rem;   /* rounded-3xl */
      --radius-input:0.75rem;
      --felixo-glow-intensity:1;
      font-family:'Space Grotesk', system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }

    *{box-sizing:border-box}

    html,body{height:100%; margin:0;}
    body{
      background:linear-gradient(to bottom, var(--bg-base) 0%, var(--bg-zinc-950) 50%, var(--bg-base) 100%);
      background-attachment:fixed;
      color:var(--text-50);
      min-height:100vh;
      line-height:1.5;
    }
    ::selection{background:rgba(147,51,234,0.40)}

    /* ---- Scrollbar customizada ---- */
    ::-webkit-scrollbar{width:8px;height:8px}
    ::-webkit-scrollbar-thumb{background:rgba(74,74,74,0.8);border-radius:4px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(106,106,106,0.9)}

    /* ============================================================
       Partículas de fundo (Felixo BackgroundParticles)
       ============================================================ */
    #particles{
      position:fixed; inset:0; z-index:0;
      pointer-events:none; user-select:none; overflow:hidden;
    }
    .particle{
      position:absolute; border-radius:9999px;
      background:#e9d5ff;
      box-shadow:0 0 15px rgba(192,132,252,0.8);
      filter:blur(0.5px);
      animation:particle-float linear infinite;
      opacity:0;
    }
    @keyframes particle-float{
      0%{transform:translateY(0);opacity:0}
      10%{opacity:var(--p-opacity)}
      90%{opacity:var(--p-opacity)}
      100%{transform:translateY(-150px);opacity:0}
    }
    @media (prefers-reduced-motion: reduce){
      .particle{animation:none;display:none}
      .felixo-card-glow{animation:none}
    }

    /* ---- Layout base ---- */
    .layer{position:relative; z-index:10}
    .container{max-width:1280px; margin:0 auto; padding:0 24px}

    header{display:flex;align-items:center;gap:16px;padding:28px 0 20px}
    .logo{
      width:46px;height:46px;border-radius:0.75rem;
      background:linear-gradient(135deg, var(--felixo-purple-bright), var(--felixo-purple));
      display:flex;align-items:center;justify-content:center;
      font-weight:700;font-size:20px;color:#fff;
      box-shadow:0 0 20px rgba(168,85,247,0.45);
    }
    header h1{margin:0;font-size:22px;font-weight:700;letter-spacing:0.2px}
    .text-felixo-purple-glow{
      color:var(--felixo-purple-bright);
      text-shadow:0 0 8px rgba(168,85,247,0.55), 0 0 44px rgba(168,85,247,0.32);
      animation:text-glow-breathe 3.8s ease-in-out infinite;
    }
    @keyframes text-glow-breathe{
      0%,100%{text-shadow:0 0 8px rgba(168,85,247,0.45), 0 0 30px rgba(168,85,247,0.22)}
      50%{text-shadow:0 0 12px rgba(168,85,247,0.65), 0 0 48px rgba(168,85,247,0.38)}
    }

    /* ---- Card base (design system) ---- */
    .card{
      background:rgba(9,9,11,0.50);
      border:1px solid var(--border);
      border-radius:var(--radius-lg);
      box-shadow:0 6px 18px rgba(2,6,23,0.6);
    }

    /* ---- Topbar / controles ---- */
    .topbar{
      display:flex;gap:16px;align-items:center;flex-wrap:wrap;
      padding:16px 20px;margin-top:8px;
    }
    .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .toolbar{display:flex;gap:10px;align-items:center;margin-left:auto;flex-wrap:wrap}

    input,select,button,textarea{font:inherit;color:inherit}
    input,select,textarea{
      background:rgba(39,39,42,0.5);
      border:1px solid var(--border);
      border-radius:var(--radius-input);
      padding:8px 12px;
      outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    input::placeholder,textarea::placeholder{color:var(--text-400)}
    input:focus,select:focus,textarea:focus{
      border-color:rgba(168,85,247,0.6);
      box-shadow:0 0 0 2px rgba(168,85,247,0.4), 0 0 0 4px rgba(168,85,247,0.2);
    }
    select{cursor:pointer}

    button{cursor:pointer;border:1px solid var(--border);background:rgba(39,39,42,0.6);
      border-radius:var(--radius);padding:8px 16px;transition:background .2s, border-color .2s, transform .1s}
    button:hover{background:rgba(63,63,70,0.7);border-color:var(--border-hover)}
    button:active{transform:translateY(1px)}
    button:focus-visible{outline:2px solid var(--felixo-purple-bright);outline-offset:2px}
    .btn-primary{
      background:linear-gradient(135deg,var(--felixo-purple-bright), var(--felixo-purple));
      color:#fff;border:none;font-weight:600;
      box-shadow:0 4px 14px rgba(168,85,247,0.35);
    }
    .btn-primary:hover{
      background:linear-gradient(135deg,var(--felixo-purple-bright), var(--felixo-purple));
      filter:brightness(1.08);box-shadow:0 6px 20px rgba(168,85,247,0.5)
    }
    .small{padding:7px 12px;font-size:13px;border-radius:0.75rem}

    /* ---- Grid de cards ---- */
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
      gap:20px;margin-top:20px;
    }
    /* grade fixa: nº de colunas escolhido pelo usuário (data-cols="2..5") */
    .grid[data-cols="2"]{grid-template-columns:repeat(2,1fr)}
    .grid[data-cols="3"]{grid-template-columns:repeat(3,1fr)}
    .grid[data-cols="4"]{grid-template-columns:repeat(4,1fr)}
    .grid[data-cols="5"]{grid-template-columns:repeat(5,1fr)}
    /* em telas estreitas, grade fixa cede para não espremer os cards */
    @media (max-width:900px){
      .grid[data-cols="3"],.grid[data-cols="4"],.grid[data-cols="5"]{grid-template-columns:repeat(2,1fr)}
    }
    @media (max-width:560px){
      .grid[data-cols]{grid-template-columns:1fr}
    }
    .gift-card{
      display:flex;flex-direction:column;overflow:hidden;
      border-radius:var(--radius-lg);
      transition:border-color .25s, transform .2s, opacity .25s, filter .25s;
    }
    /* comprados: mais apagados e dessaturados para destacar visualmente */
    .gift-card.purchased{opacity:0.55;filter:grayscale(0.35)}
    .gift-card.purchased:hover{opacity:0.85;filter:grayscale(0.1)}
    .gift-card:hover{border-color:var(--border-hover);transform:translateY(-2px)}
    .gift-card:hover{animation:card-glow-breathe 3s ease-in-out infinite}
    @keyframes card-glow-breathe{
      0%,100%{box-shadow:0 0 15px rgba(168,85,247,0.15)}
      50%{box-shadow:0 0 40px rgba(168,85,247,0.45)}
    }
    .gift-image{
      height:180px;background:var(--bg-zinc-900);
      display:flex;align-items:center;justify-content:center;overflow:hidden;
      border-bottom:1px solid var(--border-subtle);color:var(--text-400);font-size:13px;
    }
    .gift-image img{width:100%;height:100%;object-fit:cover}
    .gift-body{padding:18px;display:flex;flex-direction:column}
    .gift-title{display:flex;flex-direction:column;align-items:flex-start;gap:6px}
    .title{font-weight:600;line-height:1.35;font-size:16px;word-break:break-word}
    .price{font-weight:700;font-size:15px;color:var(--felixo-purple)}
    .badge-status{
      align-self:flex-start;margin-top:8px;
      display:inline-flex;align-items:center;gap:6px;
      font-size:11px;font-weight:600;padding:3px 10px;border-radius:9999px;
      background:rgba(34,197,94,0.12);color:#86efac;border:1px solid rgba(34,197,94,0.4);
    }
    .tags{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap}
    .tag{
      font-size:11px;font-weight:500;padding:4px 10px;border-radius:9999px;
      background:rgba(168,85,247,0.10);color:var(--felixo-purple);
      border:1px solid rgba(168,85,247,0.20);line-height:1.2;
    }
    .note{margin-top:12px;color:var(--text-400);font-size:13px;line-height:1.5;white-space:pre-wrap}
    .actions{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}

    .empty{padding:48px 24px;text-align:center;color:var(--text-400);margin-top:20px}

    footer{padding:24px 0;color:var(--text-400);font-size:13px}

    /* ============================================================
       Modal acessível (role=dialog)
       ============================================================ */
    .modal{
      position:fixed;inset:0;z-index:50;
      display:flex;align-items:center;justify-content:center;
      background:rgba(0,0,0,0.80);backdrop-filter:blur(4px);
      padding:20px;
    }
    .modal-card{
      width:980px;max-width:100%;max-height:92vh;overflow:auto;padding:24px;
      border-radius:var(--radius);
      background:linear-gradient(180deg, rgba(24,24,27,0.98), rgba(9,9,11,0.99));
      border:1px solid rgba(168,85,247,0.30);
      box-shadow:0 12px 40px rgba(2,6,23,0.7), 0 0 30px rgba(168,85,247,0.20);
    }
    .modal-card h2{margin:0 0 16px;font-size:20px;font-weight:700}
    label{display:block;font-size:13px;color:var(--text-300);margin-bottom:6px}
    .field{margin-top:14px}
    .row{display:flex;gap:16px}
    .col{flex:1;min-width:0}
    .side{width:340px;max-width:100%}
    .preview-box{
      height:200px;border-radius:var(--radius-input);overflow:hidden;
      background:var(--bg-zinc-900);display:flex;align-items:center;justify-content:center;
      margin-bottom:8px;color:var(--text-400);
    }
    .preview-box img{max-width:100%;max-height:100%;display:none}
    .check-row{display:flex;gap:8px;align-items:center;margin-top:6px;color:var(--text-400)}
    .modal-actions{margin-top:18px;display:flex;gap:8px}

    /* ============================================================
       FAB (Floating Action Button)
       ============================================================ */
    .fab{
      position:fixed;bottom:28px;right:28px;width:64px;height:64px;
      border-radius:50%;
      background:linear-gradient(135deg,var(--felixo-purple-bright),var(--felixo-purple));
      color:#fff;border:none;font-size:30px;font-weight:300;line-height:1;
      box-shadow:0 8px 24px rgba(168,85,247,0.4);
      display:flex;align-items:center;justify-content:center;
      transition:transform .2s ease, box-shadow .2s ease;z-index:40;
    }
    .fab:hover{transform:scale(1.1);box-shadow:0 12px 32px rgba(168,85,247,0.6)}
    .fab:active{transform:scale(0.95)}

    /* visually hidden mas acessível a leitores de tela */
    .sr-only{
      position:absolute;width:1px;height:1px;padding:0;margin:-1px;
      overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;
    }

    /* ---- responsivo ---- */
    @media (max-width:720px){
      .row{flex-direction:column}
      .side{width:100%}
      .gift-image{height:150px}
      .fab{width:56px;height:56px;bottom:20px;right:20px;font-size:26px}
      .toolbar{margin-left:0}
    }
  </style>
</head>
<body>
  <!-- Camada de fundo: partículas roxas flutuantes -->
  <div id="particles" aria-hidden="true"></div>

  <div class="layer">
    <div class="container">
      <header>
        <div class="logo" aria-hidden="true">F</div>
        <h1>Organizador de Presentes do <span class="text-felixo-purple-glow">Felixo</span> ✨</h1>
      </header>

      <main>
        <div class="topbar card" role="search">
          <div class="controls">
            <button id="btnAdd" class="btn-primary">+ Novo presente</button>

            <label for="sortBy" class="sr-only">Ordenar presentes</label>
            <select id="sortBy" title="Ordenar">
              <option value="date_desc">Mais recentes</option>
              <option value="date_asc">Mais antigos</option>
              <option value="price_asc">Preço: menor → maior</option>
              <option value="price_desc">Preço: maior → menor</option>
            </select>

            <label for="filterPurchased" class="sr-only">Filtrar por status</label>
            <select id="filterPurchased" title="Filtrar por status">
              <option value="all">Todos</option>
              <option value="not">Não comprados</option>
              <option value="yes">Comprados</option>
            </select>

            <label for="gridCols" class="sr-only">Cards por linha</label>
            <select id="gridCols" title="Cards por linha">
              <option value="auto">Grade: automática</option>
              <option value="2">Grade: 2 por linha</option>
              <option value="3">Grade: 3 por linha</option>
              <option value="4">Grade: 4 por linha</option>
              <option value="5">Grade: 5 por linha</option>
            </select>

            <label for="search" class="sr-only">Pesquisar presentes</label>
            <input id="search" type="search" placeholder="Pesquisar por nome, tags ou notas" style="min-width:260px" />
          </div>
          <div class="toolbar">
            <button id="btnExport">Exportar JSON</button>
            <button id="btnImport">Importar JSON</button>
            <button id="btnClear">Limpar tudo</button>
          </div>
        </div>

        <div id="list" class="grid" aria-live="polite"></div>

        <div id="empty" class="empty card" style="display:none">
          Nenhum presente ainda — clique em "Novo presente" para começar 🎁
        </div>

        <footer>
          <div class="hint">Salvo localmente no seu navegador (localStorage). Use exportar para backup ou compartilhar.</div>
        </footer>
      </main>
    </div>
  </div>

  <!-- Modal de cadastro / edição -->
  <div id="modal" class="modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-card">
      <h2 id="modalTitle">Novo presente</h2>
      <form id="giftForm">
        <div class="row">
          <div class="col">
            <div class="field">
              <label for="title">Título</label>
              <input id="title" required placeholder="Ex: Relógio vintage" style="width:100%" />
            </div>

            <div class="field">
              <label for="price">Preço (número)</label>
              <div style="display:flex;gap:8px;align-items:center">
                <input id="price" type="number" step="0.01" min="0" placeholder="Ex: 199.90" style="flex:1" />
                <label for="currency" class="sr-only">Moeda</label>
                <input id="currency" placeholder="R$" style="width:80px" />
              </div>
            </div>

            <div class="field">
              <label for="url">Link do anúncio</label>
              <input id="url" type="url" inputmode="url" placeholder="https://..." style="width:100%" />
            </div>

            <div class="field">
              <label for="tags">Tags (cada palavra vira uma tag)</label>
              <input id="tags" placeholder="ex: presente aniversário tech vermelho" style="width:100%" />
            </div>

            <div class="field">
              <label for="notes">Anotações</label>
              <textarea id="notes" rows="6" placeholder="Observações, ideias de embalagem, tamanho, cor..." style="width:100%"></textarea>
            </div>
          </div>

          <div class="side">
            <div class="field">
              <label for="imgUrl">Imagem (URL ou enviar arquivo)</label>
              <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
                <input id="imgUrl" type="url" placeholder="https://... (opcional)" style="flex:1" />
                <button id="btnFetchImage" type="button" class="small">Usar URL</button>
              </div>
              <div style="margin-bottom:8px">
                <label for="imgFile" class="sr-only">Enviar arquivo de imagem</label>
                <input id="imgFile" type="file" accept="image/*" />
              </div>
              <div class="preview-box">
                <img id="preview" src="" alt="Pré-visualização da imagem do presente" />
                <span id="previewEmpty">Preview da imagem</span>
              </div>
            </div>

            <div class="field">
              <label for="purchased">Marcar como comprado?</label>
              <div class="check-row">
                <input id="purchased" type="checkbox" /> <span>Sim</span>
              </div>
            </div>

            <div class="modal-actions">
              <button id="saveBtn" class="btn-primary">Salvar</button>
              <button id="cancelBtn" type="button">Cancelar</button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>

  <input id="fileImportInput" type="file" accept="application/json" style="display:none" aria-hidden="true" />

  <!-- Floating Action Button -->
  <button id="fabAdd" class="fab" aria-label="Adicionar novo presente" title="Adicionar novo presente">+</button>

  <script>
    (()=>{
      'use strict';
      const LS_KEY = 'felixo_gifts_v1';
      const PREFS_KEY = 'felixo_gifts_prefs_v1';
      const q  = s  => document.querySelector(s);
      const el = id => document.getElementById(id);

      // ---- estado ----
      let gifts = load();
      let editingId = null;
      let lastFocused = null; // foco a restaurar ao fechar o modal

      const listEl  = q('#list');
      const emptyEl = q('#empty');
      const modalEl = q('#modal');

      // ============================================================
      // Validação de URL — bloqueia esquemas perigosos (javascript:, data:, etc.)
      // Usada antes de abrir/copiar links e ao definir a imagem por URL.
      // ============================================================
      function safeUrl(raw){
        const s = (raw || '').trim();
        if(!s) return null;
        let parsed;
        try{ parsed = new URL(s); }catch(_){ return null; }
        return (parsed.protocol === 'http:' || parsed.protocol === 'https:') ? parsed.href : null;
      }
      function safeImageUrl(raw){
        const s = (raw || '').trim();
        if(!s) return null;
        // imagens podem vir como data:image/... (upload via FileReader) ou http(s)
        if(s.startsWith('data:image/')) return s;
        return safeUrl(s);
      }

      // ---- partículas de fundo (Felixo) ----
      function spawnParticles(){
        const host = el('particles');
        const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if(reduce) return;
        const count = 35;
        const frag = document.createDocumentFragment();
        for(let i=0;i<count;i++){
          const size = Math.random()*4 + 2;          // 2px – 6px
          const opacity = Math.random()*0.5 + 0.5;   // 0.5 – 1.0
          const p = document.createElement('div');
          p.className = 'particle';
          p.style.left = (Math.random()*100) + '%';
          p.style.top  = (Math.random()*100) + '%';
          p.style.width = size + 'px';
          p.style.height = size + 'px';
          p.style.setProperty('--p-opacity', opacity);
          p.style.animationDuration = (Math.random()*8 + 4) + 's'; // 4s – 12s
          p.style.animationDelay = (Math.random()*2) + 's';        // 0s – 2s
          frag.appendChild(p);
        }
        host.appendChild(frag);
      }

      // ============================================================
      // Wiring de UI
      // ============================================================
      el('btnAdd').addEventListener('click', ()=>openModal());
      el('fabAdd').addEventListener('click', ()=>openModal());
      el('btnExport').addEventListener('click', exportJSON);
      el('btnImport').addEventListener('click', ()=>el('fileImportInput').click());
      el('fileImportInput').addEventListener('change', handleImportFile);
      el('btnClear').addEventListener('click', clearAll);
      el('btnFetchImage').addEventListener('click', useImgUrl);
      el('imgFile').addEventListener('change', handleImgFile);
      el('cancelBtn').addEventListener('click', closeModal);
      el('giftForm').addEventListener('submit', saveGift);
      el('sortBy').addEventListener('change', render);
      el('filterPurchased').addEventListener('change', render);
      el('search').addEventListener('input', render);
      el('gridCols').addEventListener('change', ()=>{ savePrefs(); applyGridCols(); });

      // fecha o modal com Esc ou clique no overlay
      document.addEventListener('keydown', e=>{ if(e.key==='Escape' && modalEl.style.display==='flex') closeModal(); });
      modalEl.addEventListener('mousedown', e=>{ if(e.target===modalEl) closeModal(); });

      spawnParticles();
      loadPrefs();
      applyGridCols();
      render();

      // ============================================================
      // Persistência
      // ============================================================
      function uid(){ return 'g_'+Math.random().toString(36).slice(2,9); }
      function load(){ try{ return JSON.parse(localStorage.getItem(LS_KEY)) || []; }catch(_){ return []; } }
      function saveAll(){ localStorage.setItem(LS_KEY, JSON.stringify(gifts)); }

      // preferências de visualização (separadas dos dados dos presentes)
      function loadPrefs(){
        try{
          const prefs = JSON.parse(localStorage.getItem(PREFS_KEY)) || {};
          if(prefs.gridCols) el('gridCols').value = prefs.gridCols;
        }catch(_){ /* ignora prefs corrompidas */ }
      }
      function savePrefs(){
        localStorage.setItem(PREFS_KEY, JSON.stringify({ gridCols: el('gridCols').value }));
      }
      // aplica o nº de colunas escolhido; 'auto' remove o override (volta ao auto-fill responsivo)
      function applyGridCols(){
        const cols = el('gridCols').value;
        if(cols === 'auto') listEl.removeAttribute('data-cols');
        else listEl.setAttribute('data-cols', cols);
      }

      // ============================================================
      // Modal
      // ============================================================
      function openModal(gift=null){
        lastFocused = document.activeElement;
        editingId = gift ? gift.id : null;
        q('#modalTitle').textContent = gift ? 'Editar presente' : 'Novo presente';
        el('title').value    = gift?.title || '';
        el('price').value    = gift?.price != null ? String(gift.price) : '';
        el('currency').value = gift?.currency || 'R$';
        el('url').value      = gift?.url || '';
        el('tags').value     = (gift?.tags || []).join(' ');
        el('notes').value    = gift?.notes || '';
        // imageIsURL distingue URL de base64; só preenche o campo de URL quando for de fato uma URL
        el('imgUrl').value   = (gift?.imageData && gift?.imageIsURL) ? gift.imageData : '';
        setPreview(gift?.imageData || '');
        el('purchased').checked = !!gift?.purchased;
        modalEl.style.display = 'flex';
        el('title').focus();
      }

      function closeModal(){
        modalEl.style.display = 'none';
        el('giftForm').reset();
        setPreview('');
        editingId = null;
        if(lastFocused && typeof lastFocused.focus === 'function') lastFocused.focus();
      }

      function setPreview(src){
        const img = el('preview'), ph = el('previewEmpty');
        if(src){ img.src = src; img.style.display='block'; ph.style.display='none'; }
        else   { img.removeAttribute('src'); img.style.display='none'; ph.style.display='block'; }
      }

      // ============================================================
      // Salvar presente — preserva o contrato do objeto `gift`
      // ============================================================
      function saveGift(ev){
        ev.preventDefault();
        const title = el('title').value.trim();
        if(!title){ alert('Preencha o título.'); el('title').focus(); return; }

        const priceRaw = el('price').value.trim();
        const price = priceRaw === '' ? null : parseFloat(priceRaw);
        const currency = el('currency').value.trim() || 'R$';

        const urlRaw = el('url').value.trim();
        const url = urlRaw ? (safeUrl(urlRaw) || '') : '';
        if(urlRaw && !url){ alert('O link do anúncio precisa começar com http:// ou https://'); el('url').focus(); return; }

        const tags = el('tags').value.trim().split(/[\s,]+/).map(t=>t.trim()).filter(Boolean);
        const notes = el('notes').value.trim();
        const purchased = el('purchased').checked;

        const previewSrc = el('preview').getAttribute('src') || '';
        const imageData = safeImageUrl(previewSrc) || '';
        const imageIsURL = !!imageData && !imageData.startsWith('data:');

        if(editingId){
          const g = gifts.find(x=>x.id===editingId);
          if(!g) return;
          Object.assign(g, { title, price, currency, url, tags, notes, purchased, imageData, imageIsURL, updatedAt: Date.now() });
        } else {
          gifts.unshift({ id:uid(), title, price, currency, url, tags, notes, purchased, imageData, imageIsURL, createdAt:Date.now(), updatedAt:Date.now() });
        }
        saveAll();
        closeModal();
        render();
      }

      // ============================================================
      // Render
      // ============================================================
      function render(){
        const search = el('search').value.trim().toLowerCase();
        const filter = el('filterPurchased').value;
        const sortBy = el('sortBy').value;

        let out = gifts.filter(g=>{
          if(filter==='yes' && !g.purchased) return false;
          if(filter==='not' &&  g.purchased) return false;
          if(!search) return true;
          const hay = (g.title+' '+(g.tags||[]).join(' ')+' '+(g.notes||'')).toLowerCase();
          return hay.includes(search) || (g.url||'').toLowerCase().includes(search);
        });

        if(sortBy==='date_desc') out.sort((a,b)=>b.createdAt - a.createdAt);
        if(sortBy==='date_asc')  out.sort((a,b)=>a.createdAt - b.createdAt);
        if(sortBy==='price_asc')  out.sort((a,b)=> (a.price ?? Infinity)  - (b.price ?? Infinity));
        if(sortBy==='price_desc') out.sort((a,b)=> (b.price ?? -Infinity) - (a.price ?? -Infinity));

        listEl.innerHTML = '';
        emptyEl.style.display = out.length===0 ? 'block' : 'none';

        out.forEach(g=>{
          const card = document.createElement('div');
          card.className = 'gift-card card' + (g.purchased ? ' purchased' : '');

          // imagem
          const imgWrap = document.createElement('div'); imgWrap.className='gift-image';
          const imgSrc = safeImageUrl(g.imageData);
          if(imgSrc){
            const img = document.createElement('img'); img.src = imgSrc; img.alt = g.title; img.loading='lazy';
            imgWrap.appendChild(img);
          } else {
            imgWrap.textContent = 'Sem imagem';
          }

          const body = document.createElement('div'); body.className='gift-body';
          const head = document.createElement('div'); head.className='gift-title';
          const t = document.createElement('div'); t.className='title'; t.textContent = g.title;
          const pprice = document.createElement('div'); pprice.className='price';
          pprice.textContent = g.price!=null ? (g.currency+' '+formatNumber(g.price)) : '—';
          head.appendChild(t); head.appendChild(pprice);
          if(g.purchased){
            const b = document.createElement('span'); b.className='badge-status'; b.textContent='✓ Comprado';
            head.appendChild(b);
          }

          const tagsWrap = document.createElement('div'); tagsWrap.className='tags';
          (g.tags||[]).forEach(tag=>{ const s=document.createElement('span'); s.className='tag'; s.textContent=tag; tagsWrap.appendChild(s); });

          const actions = document.createElement('div'); actions.className='actions';
          const safeLink = safeUrl(g.url);

          const btnView = mkBtn('Abrir link', ()=>{
            if(safeLink) window.open(safeLink, '_blank', 'noopener,noreferrer');
            else alert('Sem link válido cadastrado.');
          });
          const btnToggle = mkBtn(g.purchased ? 'Desmarcar' : 'Marcar comprado', ()=>{
            g.purchased = !g.purchased; g.updatedAt = Date.now(); saveAll(); render();
          });
          const btnEdit = mkBtn('Editar', ()=>openModal(g));
          const btnCopy = mkBtn('Copiar link', ()=>{
            if(!safeLink) return alert('Sem link válido.');
            navigator.clipboard.writeText(safeLink).then(()=>alert('Link copiado')).catch(()=>alert('Não foi possível copiar.'));
          });
          const btnDel = mkBtn('Apagar', ()=>{
            if(confirm('Apagar este presente?')){ gifts = gifts.filter(x=>x.id!==g.id); saveAll(); render(); }
          });

          actions.append(btnView, btnToggle, btnEdit, btnCopy, btnDel);

          body.appendChild(head);
          if((g.tags||[]).length) body.appendChild(tagsWrap);
          if(g.notes){ const note=document.createElement('div'); note.className='note'; note.textContent=g.notes; body.appendChild(note); }
          body.appendChild(actions);

          card.appendChild(imgWrap); card.appendChild(body);
          listEl.appendChild(card);
        });
      }

      function mkBtn(label, onClick){
        const b = document.createElement('button');
        b.type='button'; b.className='small'; b.textContent=label;
        b.addEventListener('click', onClick);
        return b;
      }

      function formatNumber(n){
        return Number(n).toLocaleString(undefined, { minimumFractionDigits: n%1?2:0, maximumFractionDigits:2 });
      }

      // ============================================================
      // Imagem
      // ============================================================
      function useImgUrl(){
        const url = safeImageUrl(el('imgUrl').value);
        if(!url){ alert('Cole uma URL de imagem válida (http:// ou https://).'); return; }
        setPreview(url);
      }
      function handleImgFile(e){
        const f = e.target.files && e.target.files[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = ()=> setPreview(reader.result);
        reader.readAsDataURL(f);
      }

      // ============================================================
      // Exportar / Importar JSON — formato estável (array de gifts)
      // ============================================================
      function exportJSON(){
        const data = JSON.stringify(gifts, null, 2);
        const blob = new Blob([data], { type:'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'felixo_gifts_export_'+(new Date().toISOString().slice(0,10))+'.json';
        a.click();
        URL.revokeObjectURL(url);
      }

      function handleImportFile(e){
        const f = e.target.files && e.target.files[0];
        if(!f) return;
        const reader = new FileReader();
        reader.onload = ()=>{
          try{
            const imported = JSON.parse(reader.result);
            if(!Array.isArray(imported)){ alert('Formato inválido: esperado um array de presentes.'); return; }
            const valid = imported.map(it=>{
              const tags = Array.isArray(it.tags)
                ? it.tags
                : (typeof it.tags==='string' ? it.tags.split(',').map(t=>t.trim()).filter(Boolean) : []);
              const imageData = safeImageUrl(it.imageData) || '';
              return {
                id: it.id || uid(),
                title: (typeof it.title==='string' && it.title.trim()) || 'Sem título',
                price: it.price==null ? null : Number(it.price),
                currency: it.currency || 'R$',
                url: safeUrl(it.url) || '',
                tags,
                notes: typeof it.notes==='string' ? it.notes : '',
                purchased: !!it.purchased,
                imageData,
                imageIsURL: !!imageData && !imageData.startsWith('data:'),
                createdAt: it.createdAt || Date.now(),
                updatedAt: it.updatedAt || Date.now()
              };
            });
            gifts = valid.concat(gifts);
            saveAll(); render();
            alert('Importação concluída ('+valid.length+' presente(s)).');
          }catch(err){
            alert('Erro ao importar: ' + err.message);
          }finally{
            e.target.value = ''; // permite reimportar o mesmo arquivo
          }
        };
        reader.readAsText(f);
      }

      function clearAll(){
        if(!confirm('Apagar todos os presentes salvos?')) return;
        gifts = []; saveAll(); render();
      }

      // ============================================================
      // Dados de exemplo no primeiro uso (evita tela em branco)
      // ============================================================
      if(gifts.length===0){
        gifts = [
          { id:uid(), title:'Colar minimalista', price:129.9, currency:'R$', url:'', tags:['aniversário','joias'], notes:'Verificar tamanho do pingente. Preferência: prata.', purchased:false, imageData:'', imageIsURL:false, createdAt:Date.now(), updatedAt:Date.now() },
          { id:uid(), title:'Placa de LED decorativa', price:199.0, currency:'R$', url:'', tags:['decoração','nerd'], notes:'Combina com quarto escuro', purchased:false, imageData:'', imageIsURL:false, createdAt:Date.now(), updatedAt:Date.now() }
        ];
        saveAll();
        render();
      }
    })();
  </script>
</body>
</html>
